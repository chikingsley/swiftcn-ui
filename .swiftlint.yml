strict: true
allow_zero_lintable_files: false
check_for_updates: false

included:
  - Sources
  - Showcase/Sources
  - cli/Sources

excluded:
  - .build
  - cli/.build

# swift-format owns collection layout, including its required trailing commas.
# Keeping the overlapping SwiftLint rule enabled makes the two tools disagree.
disabled_rules:
  # SwiftUI.Text supports concatenation with + but does not define +=.
  - shorthand_operator
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - legacy_multiple
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 1300
  error: 1600

type_body_length:
  warning: 900
  error: 1100

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - dx
    - i
    - URL

reporter: xcode
